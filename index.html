<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escher Blocks – 3D Sketch & Doodle App</title>
    <meta name="description"
        content="Escher Blocks is a creative 3D sketch and doodle app. Build stunning 3D artwork with intuitive tools." />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background-color: #fff;
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hero {
            flex: 1;
            width: 100%;
            min-height: 100vh;
            background: url('FeatureGraphics.png') center center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hero-text {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            font-size: 2em;
            z-index: 1;
        }

        .store-strip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        .store-strip a {
            display: block;
            transition: transform 0.2s;
        }

        .store-strip a:hover {
            transform: scale(1.05);
        }

        .store-strip img {
            height: 80px;
            width: auto;
            display: block;
        }

        .bottom-content {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .features {
            text-align: center;
            padding: 15px;
            font-size: 1.1em;
            background-color: rgba(240, 244, 255, 0.95);
            backdrop-filter: blur(10px);
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.9em;
            background-color: rgba(238, 238, 238, 0.95);
            backdrop-filter: blur(10px);
            margin: 0;
        }

        footer a {
            margin: 0 10px;
            color: #333;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Mobile/Portrait responsive adjustments */
        @media (max-width: 768px) {
            .hero {
                background-image: url('FeatureGraphics-mobile.png');
                background-position: top center;
                background-size: contain;
            }

            .hero-text {
                font-size: 1.4em;
                top: 10px;
            }

            .store-strip {
                flex-direction: row;
                gap: 30px;
                padding: 15px;
                top: 55%;
            }

            .store-strip img {
                height: 60px;
            }

            .features {
                font-size: 0.95em;
                padding: 12px;
            }

            footer {
                font-size: 0.8em;
                padding: 10px;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
            }

            footer a {
                margin: 0 5px;
            }
        }

        @media (max-width: 480px) {
            .store-strip {
                gap: 20px;
            }

            .store-strip img {
                height: 50px;
            }

            .features {
                font-size: 0.85em;
                padding: 10px;
            }
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 80%;
            width: 350px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-content h2 {
            margin-bottom: 15px;
            color: #111;
            font-size: 1.6em;
            font-weight: 700;
        }

        .modal-content p {
            margin-bottom: 25px;
            color: #555;
            line-height: 1.5;
            font-size: 1.05em;
        }

        .modal-content button {
            background-color: #222;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .modal-content button:hover {
            background-color: #444;
            transform: scale(1.05);
        }

        .modal-content button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div class="hero">
        <div class="hero-text">

        </div>

        <div class="store-strip">
            <a href="https://apps.apple.com/app/escher-blocks/id6757327542">
                <img src="./appstore-badge.svg" alt="Download on the App Store" />
            </a>
            <a href="#" onclick="openModal(event)">
                <img src="./playstore-badge.png" alt="Get it on Google Play" />
            </a>
        </div>

        <div class="bottom-content">
            <div class="features">
                Create stunning 3D sketches • Intuitive tools • Mobile-first design
            </div>

            <footer>
                <a href="./privacy.html">Privacy Policy</a>
                <a href="./terms.html">Terms of Service</a>
                <a href="./support.html">Support</a>
                <a href="mailto:support@schr.app">Contact</a>
            </footer>
        </div>
    </div>

    <!-- Coming Soon Modal -->
    <div id="comingSoonModal" class="modal-overlay">
        <div class="modal-content">
            <h2>Coming Soon</h2>
            <p>Android App will be available in a few days. Please check back next week.</p>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function openModal(e) {
            if (e) e.preventDefault();
            document.getElementById('comingSoonModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('comingSoonModal').classList.remove('active');
        }

        // Close when clicking outside of the modal content
        document.getElementById('comingSoonModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>

</html>
